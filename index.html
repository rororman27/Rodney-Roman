<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Analyst Portfolio | Power BI & Azure Solutions</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* ── Warm neutral palette ── */
    --bg:          #f5f0e8;        /* warm parchment */
    --bg-mid:      #ede8de;        /* slightly deeper section */
    --bg-card:     #faf7f2;        /* card surface — almost white */
    --bg-dark:     #1c1917;        /* footer / dark moments */
    --border:      rgba(28,25,23,0.10);
    --border-dark: rgba(28,25,23,0.18);

    /* ── Ink & type ── */
    --ink:         #1c1917;        /* near-black body text */
    --ink-mid:     #44403c;        /* secondary text */
    --ink-light:   #78716c;        /* muted / captions */

    /* ── Accent — single warm slate-teal, no neon ── */
    --accent:      #2d6a6a;        /* deep teal — professional, not electric */
    --accent-warm: #b45309;        /* amber-brown for highlights */
    --accent-light: #e8f4f4;       /* tint for badges */

    /* ── Shadows & texture ── */
    --shadow-sm:   0 1px 3px rgba(28,25,23,0.08), 0 1px 2px rgba(28,25,23,0.05);
    --shadow-md:   0 4px 12px rgba(28,25,23,0.10), 0 2px 4px rgba(28,25,23,0.06);
    --shadow-lg:   0 12px 32px rgba(28,25,23,0.12), 0 4px 8px rgba(28,25,23,0.06);

    /* ── Aliases so existing vars still resolve ── */
    --navy:        var(--bg);
    --navy-mid:    var(--bg-mid);
    --navy-card:   var(--bg-card);
    --navy-border: var(--border);
    --accent2:     var(--accent);
    --accent3:     var(--accent-warm);
    --text-primary:   var(--ink);
    --text-secondary: var(--ink-mid);
    --text-muted:     var(--ink-light);
    --gradient-hero: linear-gradient(160deg, #eee8da 0%, #e8e0d0 60%, #dfd7c5 100%);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--navy);
    color: var(--text-primary);
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.1rem 6%;
    background: rgba(245,240,232,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 800; font-size: 1.15rem;
    color: var(--accent); letter-spacing: -0.01em;
  }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a {
    font-size: 0.875rem; font-weight: 400;
    color: var(--text-secondary); text-decoration: none;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--text-primary); }
  .nav-cta {
    font-size: 0.875rem; font-weight: 500;
    padding: 0.5rem 1.25rem;
    background: var(--accent); color: #fff;
    border-radius: 6px; text-decoration: none;
    transition: opacity 0.2s;
  }
  .nav-cta:hover { opacity: 0.88; }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    display: flex; flex-direction: column; justify-content: center;
    padding: 8rem 6% 5rem;
    background: var(--gradient-hero);
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 55% 50% at 85% 40%, rgba(45,106,106,0.07) 0%, transparent 65%),
      radial-gradient(ellipse 40% 40% at 10% 80%, rgba(180,83,9,0.05) 0%, transparent 60%);
    pointer-events: none;
  }
  .hero-grid-bg {
    position: absolute; inset: 0; pointer-events: none;
    /* subtle noise texture using SVG filter */
    opacity: 0.4;
  }
  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 0.8rem; font-weight: 500; letter-spacing: 0.12em;
    color: var(--accent); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 1.5rem;
  }
  .hero-eyebrow span { display: inline-block; width: 28px; height: 1px; background: var(--accent); opacity: 0.6; }
  h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(2.6rem, 6vw, 4.5rem);
    font-weight: 800; line-height: 1.08;
    letter-spacing: -0.03em; max-width: 780px; margin-bottom: 1.5rem;
  }
  h1 em {
    font-style: italic;
    color: var(--accent);
    background: none;
    -webkit-background-clip: unset;
    background-clip: unset;
  }
  .hero-sub {
    font-size: 1.125rem; font-weight: 300;
    color: var(--text-secondary); max-width: 560px; margin-bottom: 2.5rem;
  }
  .hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 0.875rem 2rem;
    background: var(--accent); color: #fff;
    font-weight: 500; font-size: 0.9rem;
    border-radius: 6px; text-decoration: none;
    transition: transform 0.2s, opacity 0.2s;
  }
  .btn-primary:hover { transform: translateY(-1px); opacity: 0.9; }
  .btn-outline {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 0.875rem 2rem;
    border: 1px solid var(--border-dark); color: var(--ink);
    font-weight: 400; font-size: 0.9rem;
    border-radius: 6px; text-decoration: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .btn-outline:hover { border-color: var(--accent); background: var(--accent-light); }
  .hero-badges {
    display: flex; gap: 1rem; flex-wrap: wrap;
    margin-top: 3rem; padding-top: 3rem;
    border-top: 1px solid var(--navy-border);
  }
  .badge {
    display: flex; align-items: center; gap: 8px;
    padding: 0.4rem 0.9rem;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 4px; font-size: 0.78rem; color: var(--ink-mid);
    box-shadow: var(--shadow-sm);
  }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .badge-dot.blue { background: var(--accent); }
  .badge-dot.amber { background: var(--accent-warm); }

  /* ── SECTIONS ── */
  section { padding: 6rem 6%; }
  .section-label {
    display: flex; align-items: center; gap: 10px;
    font-size: 0.7rem; font-weight: 600; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 0.75rem;
  }
  .section-label::before { content: ''; display: block; width: 18px; height: 1px; background: var(--accent); opacity: 0.7; }
  h2 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(1.8rem, 3.5vw, 2.6rem);
    font-weight: 700; letter-spacing: -0.025em;
    line-height: 1.15; margin-bottom: 1rem;
  }
  .section-intro {
    color: var(--ink-mid); font-size: 1rem;
    max-width: 560px; margin-bottom: 3rem;
    line-height: 1.7;
  }

  /* ── EXPERTISE ── */
  #expertise { background: var(--navy-mid); }
  .expertise-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.5rem; }
  .exp-card {
    background: var(--navy-card); border: 1px solid var(--navy-border);
    border-radius: 8px; padding: 1.75rem;
    position: relative; overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.25s, transform 0.25s;
  }
  .exp-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .exp-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--accent-line, linear-gradient(90deg, var(--accent), transparent));
  }
  .exp-icon {
    width: 44px; height: 44px; border-radius: 10px;
    background: rgba(0,201,167,0.1);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem; margin-bottom: 1.25rem;
  }
  .exp-icon.blue { background: rgba(59,130,246,0.1); }
  .exp-icon.amber { background: rgba(245,158,11,0.1); }
  .exp-card h3 { font-family: 'Playfair Display', Georgia, serif; font-size: 1rem; font-weight: 600; margin-bottom: 0.6rem; }
  .exp-card p { font-size: 0.875rem; color: var(--text-secondary); line-height: 1.65; }
  .exp-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 1.1rem; }
  .exp-tag {
    font-size: 0.72rem; font-weight: 500;
    padding: 3px 10px; border-radius: 100px;
    background: rgba(255,255,255,0.05); color: var(--text-secondary);
    border: 1px solid var(--navy-border);
  }

  /* ── PROJECTS / CASE STUDIES ── */
  #projects { background: var(--navy); }

  /* Featured case study — full width hero card */
  .case-study-featured {
    background: var(--navy-card);
    border: 1px solid var(--navy-border);
    border-radius: 10px; overflow: hidden;
    margin-bottom: 1.5rem;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.3s, transform 0.2s;
  }
  .case-study-featured:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }

  .csf-inner {
    display: grid; grid-template-columns: 1fr 1.2fr;
    min-height: 500px;
  }
  .csf-inner.wide-preview {
    grid-template-columns: 0.85fr 1.15fr;
    min-height: 540px;
  }
  .csf-content {
    padding: 2.5rem 2.75rem;
    display: flex; flex-direction: column; justify-content: space-between;
    border-right: 1px solid var(--border);
  }
  .csf-preview {
    padding: 1.5rem;
    background: var(--bg-mid);
    display: flex; flex-direction: column; gap: 1rem;
    position: relative; overflow: hidden;
  }
  .csf-preview::before {
    content: ''; position: absolute; inset: 0;
    background: none;
  }

  /* Mini dashboard preview cards */
  .preview-kpi-row { display: flex; gap: 0.75rem; }
  .preview-kpi {
    flex: 1; background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px; padding: 0.75rem;
    text-align: center;
    box-shadow: var(--shadow-sm);
  }
  .preview-kpi-label { font-size: 0.6rem; color: var(--ink-light); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
  .preview-kpi-val { font-family: 'Playfair Display', Georgia, serif; font-size: 1rem; font-weight: 700; }
  .preview-kpi-delta { font-size: 0.6rem; margin-top: 2px; }
  .delta-up { color: #166534; }
  .delta-down { color: #991b1b; }
